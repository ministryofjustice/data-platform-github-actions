---
on:
  workflow_call:
    inputs:
      chart-path:
        type: string
        required: false
        default: chart

permissions: {}

jobs:
  chart-release:
    name: Chart Release
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      id-token: write
      packages: write
    steps:
      - name: Harden Runner
        if: github.event.repository.private == false
        id: harden_runner
        uses: step-security/harden-runner@9af89fc71515a100421586dfdb3dc9c984fbf411 # v2.19.4
        with:
          egress-policy: audit

      - name: Checkout
        id: checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set Up Crane
        id: setup_crane
        uses: ministryofjustice/action-setup-crane@b8d5be6affce54f6ff5f54e90174508bf4522672 # v1.0.0

      - name: Set Up Helm
        id: setup_helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Log in to GitHub Container Registry
        id: login_ghcr
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package Chart
        id: package_chart
        shell: bash
        env:
          CHART_PATH: ${{ inputs.chart-path }}
        run: |
          helm package "${CHART_PATH}" --destination .helm-deploy

          CHART_NAME=$(yq -r '.name' "${CHART_PATH}/Chart.yaml")
          CHART_VERSION=$(yq -r '.version' "${CHART_PATH}/Chart.yaml")

          echo "chart_name=${CHART_NAME}" >> "${GITHUB_OUTPUT}"
          echo "chart_version=${CHART_VERSION}" >> "${GITHUB_OUTPUT}"

      - name: Push Chart
        id: push_chart
        shell: bash
        env:
          CHART_NAME: ${{ steps.package_chart.outputs.chart_name }}
          CHART_VERSION: ${{ steps.package_chart.outputs.chart_version }}
        run: |
          helm push ".helm-deploy/${CHART_NAME}-${CHART_VERSION}.tgz" oci://ghcr.io/ministryofjustice/data-platform-charts

          DIGEST=$(crane digest "ghcr.io/ministryofjustice/data-platform-charts/${CHART_NAME}:${CHART_VERSION}")
          echo "digest=${DIGEST}" >> "${GITHUB_OUTPUT}"

      - name: GitHub Build Provenance Attestation
        id: github_attestation
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ghcr.io/ministryofjustice/data-platform-charts/${{ steps.package_chart.outputs.chart_name }}
          subject-digest: ${{ steps.push_chart.outputs.digest }}
          push-to-registry: true

      - name: GitHub Attestation Verification
        id: github_attestation_verification
        shell: bash
        env:
          CHART_NAME: ${{ steps.package_chart.outputs.chart_name }}
          GH_TOKEN: ${{ github.token }}
          CHART_VERSION: ${{ steps.package_chart.outputs.chart_version }}
          REPOSITORY: ${{ github.repository }}
        run: |
          gh attestation verify \
            "oci://ghcr.io/ministryofjustice/data-platform-charts/${CHART_NAME}:${CHART_VERSION}" \
            --repo "${REPOSITORY}" \
            --signer-workflow ministryofjustice/data-platform-github-actions/.github/workflows/chart-release.yml
